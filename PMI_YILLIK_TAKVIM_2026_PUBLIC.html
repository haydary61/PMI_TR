		function applyFilters() {

			const allEvents = document.querySelectorAll(".event");
			const allDays = document.querySelectorAll(".day");

			const teamFilters = filters.team;
			const modeFilters = filters.mode;

			if (teamFilters.size === 0 && modeFilters.size === 0) {

				allEvents.forEach(ev => {
					ev.classList.remove("dimmed", "highlighted");
				});

				allDays.forEach(day => {
					day.classList.remove("dimmed");
				});

				return;
			}

			// Önce her şeyi soluk yap
			allEvents.forEach(ev => {
				ev.classList.add("dimmed");
				ev.classList.remove("highlighted");
			});

			allDays.forEach(day => {
				day.classList.add("dimmed");
			});

			allEvents.forEach(ev => {

				let teamMatch = false;
				let modeMatch = false;

				// TEAM OR
				if (teamFilters.size === 0) {
					teamMatch = true;
				} else {
					teamFilters.forEach(team => {
						if (ev.classList.contains(team)) {
							teamMatch = true;
						}
					});
				}

				// MODE OR
				if (modeFilters.size === 0) {
					modeMatch = true;
				} else {
					modeFilters.forEach(mode => {

						if (mode === "mode-online" && ev.dataset.mode === "online") {
							modeMatch = true;
						}

						if (mode === "mode-physical" && ev.dataset.mode === "physical") {
							modeMatch = true;
						}

					});
				}

				// KATEGORİLER ARASI AND
				if (teamMatch && modeMatch) {

					ev.classList.remove("dimmed");
					ev.classList.add("highlighted");

					const parentDay = ev.closest(".day");
					if (parentDay) parentDay.classList.remove("dimmed");
				}

			});
		}
